<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Outfit:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --cyan: #00d4ff;
            --pink: #ff6eb4;
            --grad: linear-gradient(135deg, #00d4ff, #ff6eb4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .share-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text);
        }

        .btn-download {
            background: var(--grad);
            color: #0d1117;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
        }

        #render-context {
            flex: 1;
        }

        /* Copy of all Template CSS from index.html */
        /* HACKER */
        .tpl-hacker {
            background: #0a0e14;
            color: #a8ff78;
            font-family: 'DM Mono', monospace;
            padding: 2rem;
            min-height: 100%;
        }

        .tpl-hacker .h-prompt {
            color: #4a9e5c;
            font-size: .78rem;
            margin-bottom: 1.5rem;
        }

        .tpl-hacker .h-name {
            font-size: 2.4rem;
            font-weight: 500;
            color: #a8ff78;
            letter-spacing: -.02em;
            line-height: 1;
            margin-bottom: .3rem;
        }

        .tpl-hacker .h-role {
            color: #4a9e5c;
            font-size: .88rem;
            margin-bottom: .3rem;
        }

        .tpl-hacker .h-email {
            color: #5b8c5a;
            font-size: .8rem;
            margin-bottom: 2rem;
        }

        .tpl-hacker .h-divider {
            border: none;
            border-top: 1px solid #1e3b1e;
            margin: 1.5rem 0;
        }

        .tpl-hacker .h-section-title {
            color: #4a9e5c;
            font-size: .72rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .tpl-hacker .h-section-title::before {
            content: '//';
            color: #2a6b2a;
        }

        .tpl-hacker .h-proj {
            border-left: 2px solid #1e4a1e;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }

        .tpl-hacker .h-proj-name {
            color: #c8ff99;
            font-weight: 500;
            font-size: .9rem;
            margin-bottom: .3rem;
        }

        .tpl-hacker .h-proj-desc {
            color: #5a8a5a;
            font-size: .8rem;
            line-height: 1.6;
            margin-bottom: .3rem;
        }

        .tpl-hacker .h-proj-tech {
            color: #2a5a2a;
            font-size: .73rem;
        }

        .tpl-hacker .h-proj-link {
            color: #a8ff78;
            font-size: .75rem;
            text-decoration: none;
        }

        .tpl-hacker .h-skill {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            border: 1px solid #1e4a1e;
            color: #7acc7a;
            background: rgba(168, 255, 120, .05);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: .75rem;
            margin: .2rem .2rem .2rem 0;
        }

        .tpl-hacker .h-skill-level {
            color: #2a5a2a;
            font-size: .68rem;
        }

        .tpl-hacker .h-empty {
            color: #2a5a2a;
            font-size: .8rem;
            font-style: italic;
        }

        /* EDITORIAL */
        .tpl-editorial {
            background: #faf8f3;
            color: #1a1410;
            font-family: 'Outfit', sans-serif;
            padding: 0;
            min-height: 100%;
        }

        .tpl-editorial .e-header {
            background: #1a1410;
            color: #faf8f3;
            padding: 2.5rem 2.5rem 2rem;
        }

        .tpl-editorial .e-eyebrow {
            font-size: .68rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #8a7a6a;
            margin-bottom: .8rem;
        }

        .tpl-editorial .e-name {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: .5rem;
            letter-spacing: -.03em;
        }

        .tpl-editorial .e-tagline {
            font-size: .95rem;
            color: #8a7a6a;
            font-weight: 300;
            border-left: 3px solid #c8a96e;
            padding-left: 1rem;
            margin-top: 1rem;
            line-height: 1.5;
        }

        .tpl-editorial .e-email {
            font-size: .78rem;
            color: #6a5a4a;
            margin-top: .8rem;
        }

        .tpl-editorial .e-body {
            padding: 2rem 2.5rem;
        }

        .tpl-editorial .e-col-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .tpl-editorial .e-section-num {
            font-size: 3rem;
            font-weight: 700;
            color: #e8e0d0;
            line-height: 1;
            flex-shrink: 0;
        }

        .tpl-editorial .e-section-title {
            font-size: .7rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #8a7a6a;
            border-bottom: 1px solid #d0c8b8;
            padding-bottom: .3rem;
            flex: 1;
        }

        .tpl-editorial .e-proj {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e8e0d0;
        }

        .tpl-editorial .e-proj:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .tpl-editorial .e-proj-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: .4rem;
            color: #1a1410;
        }

        .tpl-editorial .e-proj-desc {
            font-size: .85rem;
            color: #5a4a3a;
            line-height: 1.6;
            margin-bottom: .4rem;
        }

        .tpl-editorial .e-proj-tech {
            font-size: .72rem;
            color: #8a7a6a;
            letter-spacing: .04em;
            text-transform: uppercase;
            margin-bottom: .3rem;
        }

        .tpl-editorial .e-proj-link {
            font-size: .78rem;
            color: #c8a96e;
            text-decoration: none;
            font-weight: 600;
        }

        .tpl-editorial .e-skill {
            display: inline-block;
            border-bottom: 2px solid #c8a96e;
            padding: .2rem .1rem;
            font-size: .82rem;
            margin: .2rem .5rem .2rem 0;
            color: #3a2a1a;
        }

        .tpl-editorial .e-skill-level {
            font-size: .7rem;
            color: #8a7a6a;
            margin-left: .3rem;
        }

        .tpl-editorial .e-empty {
            color: #aaa;
            font-size: .82rem;
            font-style: italic;
        }

        /* GLASS */
        .tpl-glass {
            background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 50%, #001a2e 100%);
            min-height: 100%;
            padding: 2rem;
            font-family: 'Space Grotesk', sans-serif;
        }

        .tpl-glass .g-card {
            background: rgba(255, 255, 255, .06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
        }

        .tpl-glass .g-avatar-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            margin-bottom: 1rem;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, .3);
        }

        .tpl-glass .g-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: .2rem;
        }

        .tpl-glass .g-email {
            font-size: .82rem;
            color: rgba(255, 255, 255, .5);
            margin-bottom: .6rem;
        }

        .tpl-glass .g-bio {
            font-size: .85rem;
            color: rgba(255, 255, 255, .7);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .tpl-glass .g-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, .08);
            margin: 1.2rem 0;
        }

        .tpl-glass .g-section-title {
            font-size: .68rem;
            font-weight: 600;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .4);
            margin-bottom: .9rem;
        }

        .tpl-glass .g-proj {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            padding: 1rem 1.1rem;
            margin-bottom: .7rem;
        }

        .tpl-glass .g-proj:last-child {
            margin-bottom: 0;
        }

        .tpl-glass .g-proj-name {
            font-weight: 600;
            font-size: .92rem;
            color: white;
            margin-bottom: .3rem;
        }

        .tpl-glass .g-proj-desc {
            font-size: .8rem;
            color: rgba(255, 255, 255, .6);
            line-height: 1.5;
            margin-bottom: .3rem;
        }

        .tpl-glass .g-proj-tech {
            font-size: .72rem;
            color: rgba(167, 139, 250, .8);
            margin-bottom: .3rem;
        }

        .tpl-glass .g-proj-link {
            font-size: .76rem;
            color: #a78bfa;
            text-decoration: none;
        }

        .tpl-glass .g-skill {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .12);
            color: rgba(255, 255, 255, .85);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: .77rem;
            margin: .2rem .2rem .2rem 0;
        }

        .tpl-glass .g-skill-level {
            color: rgba(167, 139, 250, .8);
            font-size: .68rem;
        }

        .tpl-glass .g-empty {
            color: rgba(255, 255, 255, .3);
            font-size: .8rem;
            font-style: italic;
        }

        /* LUXURY */
        .tpl-luxury {
            background: #f9f5ef;
            font-family: 'Cormorant Garamond', serif;
            padding: 3rem 3.5rem;
            min-height: 100%;
            color: #2c1810;
        }

        .tpl-luxury .l-rule {
            width: 40px;
            height: 2px;
            background: #8b6914;
            margin-bottom: 2rem;
        }

        .tpl-luxury .l-name {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: -.02em;
            line-height: 1;
            margin-bottom: .4rem;
            color: #1a0e08;
        }

        .tpl-luxury .l-name em {
            font-style: italic;
            color: #8b6914;
        }

        .tpl-luxury .l-email {
            font-family: 'Outfit', sans-serif;
            font-size: .75rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #a08060;
            margin-bottom: .8rem;
        }

        .tpl-luxury .l-bio {
            font-size: 1.05rem;
            color: #5a3a28;
            line-height: 1.8;
            max-width: 520px;
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        .tpl-luxury .l-section {
            margin-bottom: 2.5rem;
        }

        .tpl-luxury .l-section-head {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tpl-luxury .l-section-label {
            font-family: 'Outfit', sans-serif;
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #a08060;
            white-space: nowrap;
        }

        .tpl-luxury .l-section-line {
            flex: 1;
            height: 1px;
            background: #d8c9b4;
        }

        .tpl-luxury .l-proj {
            margin-bottom: 1.8rem;
        }

        .tpl-luxury .l-proj-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a0e08;
            margin-bottom: .3rem;
        }

        .tpl-luxury .l-proj-desc {
            font-size: .95rem;
            color: #5a3a28;
            line-height: 1.7;
            margin-bottom: .4rem;
        }

        .tpl-luxury .l-proj-tech {
            font-family: 'Outfit', sans-serif;
            font-size: .7rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #a08060;
            margin-bottom: .3rem;
        }

        .tpl-luxury .l-proj-link {
            font-family: 'Outfit', sans-serif;
            font-size: .75rem;
            color: #8b6914;
            text-decoration: none;
            letter-spacing: .04em;
        }

        .tpl-luxury .l-skill {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            border-bottom: 1px solid #d8c9b4;
            padding: .2rem 0;
            font-size: .95rem;
            color: #3a2010;
            margin: .1rem .8rem .1rem 0;
        }

        .tpl-luxury .l-skill-level {
            font-family: 'Outfit', sans-serif;
            font-size: .65rem;
            color: #a08060;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .tpl-luxury .l-empty {
            color: #c0a888;
            font-size: .95rem;
            font-style: italic;
        }

        /* NEON */
        .tpl-neon {
            background: #09090b;
            font-family: 'Outfit', sans-serif;
            padding: 1.5rem;
            min-height: 100%;
        }

        .tpl-neon .n-header {
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #09090b, #18181b);
            position: relative;
            overflow: hidden;
        }

        .tpl-neon .n-header::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(249, 115, 22, .15), transparent 70%);
        }

        .tpl-neon .n-name {
            font-size: 2.4rem;
            font-weight: 700;
            color: #fafafa;
            line-height: 1;
            margin-bottom: .3rem;
        }

        .tpl-neon .n-name span {
            color: #f97316;
        }

        .tpl-neon .n-email {
            font-size: .82rem;
            color: #52525b;
            margin-bottom: .6rem;
        }

        .tpl-neon .n-bio {
            font-size: .87rem;
            color: #a1a1aa;
            line-height: 1.6;
        }

        .tpl-neon .n-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
            margin-bottom: 1rem;
        }

        .tpl-neon .n-proj-card {
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 1.1rem;
            background: #111113;
            transition: border-color .2s;
        }

        .tpl-neon .n-proj-tag {
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #f97316;
            margin-bottom: .4rem;
        }

        .tpl-neon .n-proj-name {
            font-size: .95rem;
            font-weight: 700;
            color: #fafafa;
            margin-bottom: .4rem;
        }

        .tpl-neon .n-proj-desc {
            font-size: .78rem;
            color: #71717a;
            line-height: 1.5;
            margin-bottom: .5rem;
        }

        .tpl-neon .n-proj-tech {
            font-size: .7rem;
            color: #52525b;
            margin-bottom: .4rem;
        }

        .tpl-neon .n-proj-link {
            font-size: .74rem;
            color: #f97316;
            text-decoration: none;
            font-weight: 600;
        }

        .tpl-neon .n-skills-wrap {
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 1.2rem;
            background: #111113;
        }

        .tpl-neon .n-sec-label {
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: #52525b;
            margin-bottom: .8rem;
        }

        .tpl-neon .n-skill {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: #1c1c1e;
            border: 1px solid #27272a;
            color: #fafafa;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: .77rem;
            font-weight: 500;
            margin: .2rem .2rem .2rem 0;
        }

        .tpl-neon .n-skill-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #f97316;
            flex-shrink: 0;
        }

        .tpl-neon .n-skill-level {
            color: #52525b;
            font-size: .68rem;
        }

        .tpl-neon .n-empty {
            color: #3f3f46;
            font-size: .8rem;
            font-style: italic;
        }
    </style>
</head>

<body>
    <nav class="share-nav">
        <a href="index.html" class="back-link">← Back to Editor</a>
        <button class="btn-download" onclick="downloadHTML()">Download HTML</button>
    </nav>
    <div id="render-context"></div>

    <script>
        const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

        // Renderer functions (exact copies from index.html)
        function renderHacker(p, pjs, sks, ex) {
            return `<div class="tpl-hacker">
        <div class="h-prompt">$ portfolio --user="${esc(p.email || 'anonymous')}"</div>
        <div class="h-name">${esc(p.name) || 'Your Name'}</div>
        <div class="h-role">${esc(p.bio) || '// your bio here'}</div>
        <div class="h-email">${esc(p.email) || ''}</div>
        <hr class="h-divider">
        <div class="h-section-title">projects</div>
        ${pjs.length ? pjs.map(pr => `<div class="h-proj"><div class="h-proj-name">${esc(pr.title)}</div>${pr.desc ? `<div class="h-proj-desc">${esc(pr.desc)}</div>` : ''}${pr.tech ? `<div class="h-proj-tech">stack: ${esc(pr.tech)}</div>` : ''}${pr.link ? `<a class="h-proj-link" href="${esc(pr.link)}" target="_blank">→ view_project()</a>` : ''}</div>`).join('') : '<div class="h-empty">// no projects yet</div>'}
        <hr class="h-divider">
        <div class="h-section-title">experience</div>
        ${ex.length ? ex.map(e => `<div class="h-proj"><div class="h-proj-name">${esc(e.title)} @ ${esc(e.company)}</div>${e.start ? `<div class="h-proj-tech">${e.start}${e.end ? ' — ' + e.end : ''}</div>` : ''}${e.desc ? `<div class="h-proj-desc">${esc(e.desc)}</div>` : ''}</div>`).join('') : '<div class="h-empty">// no experience added</div>'}
        <hr class="h-divider">
        <div class="h-section-title">skills</div>
        ${sks.length ? sks.map(s => `<span class="h-skill">${esc(s.name)}<span class="h-skill-level">.${esc(s.level).toLowerCase()}</span></span>`).join('') : '<div class="h-empty">// no skills added</div>'}
      </div>`;
        }

        function renderEditorial(p, pjs, sks, ex) {
            return `<div class="tpl-editorial">
        <div class="e-header">
          <div class="e-eyebrow">Portfolio — ${new Date().getFullYear()}</div>
          <div class="e-name">${esc(p.name) || 'Your Name'}</div>
          ${p.bio ? `<div class="e-tagline">${esc(p.bio)}</div>` : ''}
          ${p.email ? `<div class="e-email">${esc(p.email)}</div>` : ''}
        </div>
        <div class="e-body">
          <div class="e-col-header"><div class="e-section-num">01</div><div class="e-section-title">Selected Projects</div></div>
          ${pjs.length ? pjs.map(pr => `<div class="e-proj"><div class="e-proj-name">${esc(pr.title)}</div>${pr.desc ? `<div class="e-proj-desc">${esc(pr.desc)}</div>` : ''}${pr.tech ? `<div class="e-proj-tech">${esc(pr.tech)}</div>` : ''}${pr.link ? `<a class="e-proj-link" href="${esc(pr.link)}" target="_blank">View Project →</a>` : ''}</div>`).join('') : '<div class="e-empty">No projects added yet.</div>'}
          <div class="e-col-header" style="margin-top:2rem;"><div class="e-section-num">02</div><div class="e-section-title">Work Experience</div></div>
          ${ex.length ? ex.map(e => `<div class="e-proj"><div class="e-proj-name">${esc(e.title)}</div><div class="e-proj-tech">${esc(e.company)}${e.start ? ' • ' + e.start + (e.end ? ' — ' + e.end : '') : ''}</div>${e.desc ? `<div class="e-proj-desc">${esc(e.desc)}</div>` : ''}</div>`).join('') : '<div class="e-empty">No experience added yet.</div>'}
          <div class="e-col-header" style="margin-top:2rem;"><div class="e-section-num">03</div><div class="e-section-title">Skills & Expertise</div></div>
          ${sks.length ? sks.map(s => `<span class="e-skill">${esc(s.name)}<span class="e-skill-level">${esc(s.level)}</span></span>`).join('') : '<div class="e-empty">No skills added yet.</div>'}
        </div>
      </div>`;
        }

        function renderGlass(p, pjs, sks, ex) {
            const initials = (p.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
            return `<div class="tpl-glass">
        <div class="g-card">
          <div class="g-avatar-ring">${initials}</div>
          <div class="g-name">${esc(p.name) || 'Your Name'}</div>
          ${p.email ? `<div class="g-email">${esc(p.email)}</div>` : ''}
          ${p.bio ? `<div class="g-bio">${esc(p.bio)}</div>` : ''}
          <hr class="g-divider">
          <div class="g-section-title">Projects</div>
          ${pjs.length ? pjs.map(pr => `<div class="g-proj"><div class="g-proj-name">${esc(pr.title)}</div>${pr.desc ? `<div class="g-proj-desc">${esc(pr.desc)}</div>` : ''}${pr.tech ? `<div class="g-proj-tech">${esc(pr.tech)}</div>` : ''}${pr.link ? `<a class="g-proj-link" href="${esc(pr.link)}" target="_blank">View Project →</a>` : ''}</div>`).join('') : '<div class="g-empty">No projects yet.</div>'}
          <hr class="g-divider">
          <div class="g-section-title">Experience</div>
          ${ex.length ? ex.map(e => `<div class="g-proj"><div class="g-proj-name">${esc(e.title)} @ ${esc(e.company)}</div>${e.start ? `<div class="g-proj-tech">${e.start}${e.end ? ' → ' + e.end : ''}</div>` : ''}${e.desc ? `<div class="g-proj-desc">${esc(e.desc)}</div>` : ''}</div>`).join('') : '<div class="g-empty">No experience yet.</div>'}
          <hr class="g-divider">
          <div class="g-section-title">Skills</div>
          ${sks.length ? sks.map(s => `<span class="g-skill">${esc(s.name)}<span class="g-skill-level">• ${esc(s.level)}</span></span>`).join('') : '<div class="g-empty">No skills yet.</div>'}
        </div>
      </div>`;
        }

        function renderLuxury(p, pjs, sks, ex) {
            const nameParts = (p.name || 'Your Name').split(' ');
            const first = nameParts[0] || 'Your', rest = nameParts.slice(1).join(' ') || 'Name';
            return `<div class="tpl-luxury">
        <div class="l-rule"></div>
        <div class="l-name">${esc(first)} <em>${esc(rest)}</em></div>
        ${p.email ? `<div class="l-email">${esc(p.email)}</div>` : ''}
        ${p.bio ? `<div class="l-bio">${esc(p.bio)}</div>` : ''}
        <div class="l-section">
          <div class="l-section-head"><div class="l-section-label">Selected Works</div><div class="l-section-line"></div></div>
          ${pjs.length ? pjs.map(pr => `<div class="l-proj"><div class="l-proj-name">${esc(pr.title)}</div>${pr.desc ? `<div class="l-proj-desc">${esc(pr.desc)}</div>` : ''}${pr.tech ? `<div class="l-proj-tech">${esc(pr.tech)}</div>` : ''}${pr.link ? `<a class="l-proj-link" href="${esc(pr.link)}" target="_blank">View Project →</a>` : ''}</div>`).join('') : '<div class="l-empty">No projects yet.</div>'}
        </div>
        <div class="l-section">
          <div class="l-section-head"><div class="l-section-label">Experience</div><div class="l-section-line"></div></div>
          ${ex.length ? ex.map(e => `<div class="l-proj"><div class="l-proj-name">${esc(e.title)} @ ${esc(e.company)}</div><div class="l-proj-tech">${e.start ? ' • ' + e.start + (e.end ? ' — ' + e.end : '') : ''}</div>${e.desc ? `<div class="l-proj-desc">${esc(e.desc)}</div>` : ''}</div>`).join('') : '<div class="l-empty">No experience yet.</div>'}
        </div>
        <div class="l-section">
          <div class="l-section-head"><div class="l-section-label">Expertise</div><div class="l-section-line"></div></div>
          ${sks.length ? sks.map(s => `<span class="l-skill">${esc(s.name)}<span class="l-skill-level">${esc(s.level)}</span></span>`).join('') : '<div class="l-empty">No skills yet.</div>'}
        </div>
      </div>`;
        }

        function renderNeon(p, pjs, sks, ex) {
            return `<div class="tpl-neon">
        <div class="n-header">
          <div class="n-name">${esc((p.name || 'Your').split(' ')[0])} <span>${esc((p.name || 'Name').split(' ').slice(1).join(' ') || 'Name')}</span></div>
          ${p.email ? `<div class="n-email">${esc(p.email)}</div>` : ''}
          ${p.bio ? `<div class="n-bio">${esc(p.bio)}</div>` : ''}
        </div>
        <div class="n-grid">${pjs.map(pr => `<div class="n-proj-card"><div class="n-proj-tag">Project</div><div class="n-proj-name">${esc(pr.title)}</div>${pr.desc ? `<div class="n-proj-desc">${esc(pr.desc)}</div>` : ''}${pr.tech ? `<div class="n-proj-tech">${esc(pr.tech)}</div>` : ''}${pr.link ? `<a class="n-proj-link" href="${esc(pr.link)}" target="_blank">View →</a>` : ''}</div>`).join('')}</div>
        <div class="n-sec-label">Experience</div>
        ${ex.length ? ex.map(e => `<div class="n-proj-card" style="margin-bottom:.8rem;"><div class="n-proj-tag">Experience</div><div class="n-proj-name">${esc(e.title)} @ ${esc(e.company)}</div><div class="n-proj-tech">${e.start}${e.end ? ' — ' + e.end : ''}</div>${e.desc ? `<div class="n-proj-desc">${esc(e.desc)}</div>` : ''}</div>`).join('') : '<div class="n-empty">No experience yet.</div>'}
        <div class="n-skills-wrap">
          <div class="n-sec-label">Skills</div>
          ${sks.length ? sks.map(s => `<span class="n-skill"><span class="n-skill-dot"></span>${esc(s.name)}<span class="n-skill-level">${esc(s.level)}</span></span>`).join('') : '<div class="n-empty">No skills yet.</div>'}
        </div>
      </div>`;
        }

        // Initialize
        const user = JSON.parse(localStorage.getItem('hbCurrentUser'));
        if (!user) {
            document.getElementById('render-context').innerHTML = '<div style="padding:2rem;text-align:center;">User not found. Please log in.</div>';
        } else {
            const data = JSON.parse(localStorage.getItem(`portfolioData_${user.email}`)) || { profile: {}, projects: [], skills: [], experience: [] };
            const template = localStorage.getItem(`hbTemplate_${user.email}`) || 'hacker';
            const renderers = { hacker: renderHacker, editorial: renderEditorial, glass: renderGlass, luxury: renderLuxury, neon: renderNeon };
            const fn = renderers[template] || renderHacker;
            document.getElementById('render-context').innerHTML = fn(data.profile, data.projects, data.skills, data.experience || []);
        }

        function downloadHTML() {
            const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Outfit:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>${document.querySelector('style').innerHTML}</style>
</head>
<body style="min-height:100vh;margin:0;">
    ${document.getElementById('render-context').innerHTML}
</body>
</html>`;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'portfolio.html';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
